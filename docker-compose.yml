services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-responseray}
      POSTGRES_USER: ${POSTGRES_USER:-responseray}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-responseray} -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    network_mode: host
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      network: host
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-responseray}
      POSTGRES_USER: ${POSTGRES_USER:-responseray}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      REDIS_ADDR: 127.0.0.1:6379
      API_PORT: "8080"
      AUTH_PASSWORD: ${AUTH_PASSWORD:-changeme_in_production}
      CT_BINARY_PATH: /usr/local/bin/ct-to-timesketch
      UPLOAD_DIR: /data/uploads
      ARTIFACTS_DIR: /data/artifacts
      REPORTS_DIR: /data/reports
    volumes:
      - /data:/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_build:/usr/share/nginx/html:ro

  frontend-build:
    build:
      context: .
      dockerfile: Dockerfile.web
      network: host
    volumes:
      - frontend_build:/output

volumes:
  pgdata:
  redisdata:
  frontend_build:
