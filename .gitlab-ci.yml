# =====================================================================
# ResponseRay CI/CD pipeline
# =====================================================================
# Conventions follow the StrikeTeam/ResponseRay org pattern documented in
# the scanray-console-deployment skill:
#
# - Runners: instance-shared, NEVER untagged. We tag every job with
#   `linuxrunner` (default) or `windowsrunner` / `macrunner` where
#   needed. Available runner tags:
#     linuxrunner1/2  : linux, linuxrunner, docker, amd64
#     windowsrunner   : windows, windowsrunner, signing
#     macrunner       : macos, arm64, shell
#
# - Image pulls: route through the StrikeTeam group's GitLab Dependency
#   Proxy via ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX} so we don't hit
#   Docker Hub rate limits and pulls are LAN-cached.
#
# - Tag conventions on container images (see promote:retag-unchanged):
#     :$CI_COMMIT_SHORT_SHA  every pipeline
#     :latest                master only
#     :$CI_COMMIT_TAG        tag pipelines only
#
# - GitHub mirror: tail job pushes to MixinGasAndHaulinAss/ResponseRay
#   using the GITHUB_MIRROR_TOKEN CI/CD variable (masked).
#
# - Deploy: NOT in this pipeline. Tendril owns deploys to dev — the
#   operator triggers `update ResponseRay on dev`, Tendril runs
#   `docker compose pull && up -d` against the registry images. See
#   the responseray-deployment skill for the operator runbook.
#
# Stages
#   lint      Static analysis per component (Go vet/gofmt, tsc, shellcheck)
#   security  Always-on guardrails: hadolint, gitleaks, trivy fs scan,
#             govulncheck (per Go module), npm audit. Block on HIGH+.
#   test      go test, frontend tsc + build
#   build     Per-component collector binaries as downloadable artifacts
#   container Build & push API + web images to GitLab Container Registry,
#             then re-tag any unchanged image so :<sha> is uniform.
#   scan      Per-image trivy CVE scan against the published GLCR images.
#             Block on HIGH/CRITICAL.
#   release   Tag pipelines: zip collector binaries, attach to a Release
#   mirror    Push GitLab repo state to GitHub
#
# Force-full-pipeline trigger
#   Set CI/CD variable FORCE_RUN_ALL=true on a manual pipeline (UI:
#   "Run pipeline" -> add var) to force every per-component lint/test/build
#   /container job to run regardless of `changes:`. Use after a base-image
#   bump, security advisory, or for a clean baseline run.
#
# Required project CI/CD variables
#   GITHUB_MIRROR_TOKEN   GitHub fine-grained PAT with contents:write
#                         on MixinGasAndHaulinAss/ResponseRay (masked)
#   DOCKERHUB_USER        Docker Hub user (used to authenticate in case
#                         the dep proxy misses; non-secret, env_var)
#   DOCKERHUB_TOKEN       Docker Hub PAT (masked)
# =====================================================================

stages:
  - lint
  - security
  - test
  - build
  - container
  - scan
  - release
  - mirror

variables:
  GO_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/golang:1.22"
  GO_IMAGE_CTT: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/golang:1.26-bookworm"
  NODE_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/node:20-alpine"
  ALPINE_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/alpine:3.19"
  SHELLCHECK_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/koalaman/shellcheck-alpine:stable"
  DOCKER_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/docker:27-cli"
  DOCKER_DIND_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/library/docker:27-dind"
  DOTNET_IMAGE: "mcr.microsoft.com/dotnet/sdk:8.0"
  CRANE_IMAGE: "gcr.io/go-containerregistry/crane:debug"
  HADOLINT_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/hadolint/hadolint:latest-alpine"
  GITLEAKS_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/zricethezav/gitleaks:latest"
  TRIVY_IMAGE: "${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/aquasec/trivy:latest"
  REGISTRY: "$CI_REGISTRY_IMAGE"
  IMAGE_TAG_SHA: "$CI_COMMIT_SHORT_SHA"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: "1"
  GIT_DEPTH: "20"
  GIT_SUBMODULE_STRATEGY: none
  FF_USE_FASTZIP: "true"
  FF_TIMESTAMPS: "true"

default:
  tags: [linuxrunner]
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure

# ---------------------------------------------------------------------
# Reusable rules per component (referenced via !reference)
# ---------------------------------------------------------------------

.rules-backend:
  - if: '$FORCE_RUN_ALL == "true"'
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: ["backend/**/*"]
  - if: "$CI_COMMIT_BRANCH"
    changes: ["backend/**/*"]
  - if: '$CI_COMMIT_TAG =~ /^v/'

.rules-ctt:
  - if: '$FORCE_RUN_ALL == "true"'
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: ["ct-to-timesketch/**/*"]
  - if: "$CI_COMMIT_BRANCH"
    changes: ["ct-to-timesketch/**/*"]
  - if: '$CI_COMMIT_TAG =~ /^v/'

.rules-collector-linux:
  - if: '$FORCE_RUN_ALL == "true"'
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: ["collector-linux/**/*"]
  - if: "$CI_COMMIT_BRANCH"
    changes: ["collector-linux/**/*"]
  - if: '$CI_COMMIT_TAG =~ /^v/'

.rules-collector-macos:
  - if: '$FORCE_RUN_ALL == "true"'
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: ["collector-macos/**/*"]
  - if: "$CI_COMMIT_BRANCH"
    changes: ["collector-macos/**/*"]
  - if: '$CI_COMMIT_TAG =~ /^v/'

.rules-collector-windows:
  - if: '$FORCE_RUN_ALL == "true"'
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: ["collector/**/*"]
  - if: "$CI_COMMIT_BRANCH"
    changes: ["collector/**/*"]
  - if: '$CI_COMMIT_TAG =~ /^v/'

.rules-collector-esxi:
  - if: '$FORCE_RUN_ALL == "true"'
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: ["collector-esxi/**/*"]
  - if: "$CI_COMMIT_BRANCH"
    changes: ["collector-esxi/**/*"]
  - if: '$CI_COMMIT_TAG =~ /^v/'

.rules-frontend:
  - if: '$FORCE_RUN_ALL == "true"'
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    changes: ["frontend/**/*"]
  - if: "$CI_COMMIT_BRANCH"
    changes: ["frontend/**/*"]
  - if: '$CI_COMMIT_TAG =~ /^v/'

# Always-on rule: every master push, every MR, every tag, every manual run.
# Used by the `security` stage so guardrails NEVER skip.
.rules-always:
  - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  - if: "$CI_COMMIT_BRANCH"
  - if: '$CI_COMMIT_TAG'

.rules-master-or-tag:
  - if: '$CI_COMMIT_BRANCH == "master"'
  - if: '$CI_COMMIT_TAG =~ /^v/'

.rules-tag-only:
  - if: '$CI_COMMIT_TAG =~ /^v/'

# ---------------------------------------------------------------------
# Hidden base for Docker-in-Docker stages (container builds).
# ---------------------------------------------------------------------

.docker-job:
  image: "$DOCKER_IMAGE"
  services:
    - name: "$DOCKER_DIND_IMAGE"
      alias: docker
      command: ["--tls=false"]
  variables:
    GIT_DEPTH: "1"
  before_script:
    - docker info >/dev/null
    # Authenticate to GitLab Container Registry
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # Authenticate to Docker Hub if creds are present (avoids 429s when
    # FROM lines inside Dockerfiles bypass the dep proxy)
    - |
      if [ -n "$DOCKERHUB_USER" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
        echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin docker.io
      fi

# =====================================================================
# LINT
# =====================================================================

lint:backend:
  stage: lint
  image: "$GO_IMAGE"
  script:
    - cd backend
    - go vet ./...
    - test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }
  rules: !reference [.rules-backend]

lint:ct-to-timesketch:
  stage: lint
  image: "$GO_IMAGE_CTT"
  before_script:
    - apt-get update -q && apt-get install -y -q gcc libc6-dev
  script:
    - cd ct-to-timesketch
    - CGO_ENABLED=1 go vet ./...
    - test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }
  rules: !reference [.rules-ctt]

lint:collector-linux:
  stage: lint
  image: "$GO_IMAGE"
  script:
    - cd collector-linux
    - go vet ./...
    - test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }
  rules: !reference [.rules-collector-linux]

lint:collector-macos:
  stage: lint
  image: "$GO_IMAGE"
  variables:
    # Several collectors (filesystem.go, memory.go, ...) are gated by
    # //go:build darwin. Vet under GOOS=darwin so those files participate.
    GOOS: darwin
    CGO_ENABLED: "0"
  script:
    - cd collector-macos
    - go vet ./...
    - test -z "$(gofmt -l .)" || { gofmt -d .; exit 1; }
  rules: !reference [.rules-collector-macos]

lint:collector-esxi:
  stage: lint
  image: "$SHELLCHECK_IMAGE"
  script:
    - shellcheck -S warning collector-esxi/responseray-collector-esxi.sh
  rules: !reference [.rules-collector-esxi]

lint:frontend:
  stage: lint
  image: "$NODE_IMAGE"
  script:
    - cd frontend
    # Prefer reproducible `npm ci` when a lockfile is present; fall back to
    # `npm install` until frontend/package-lock.json is committed.
    # TODO: commit frontend/package-lock.json and switch this back to npm ci.
    - if [ -f package-lock.json ]; then npm ci --no-audit --no-fund; else npm install --no-audit --no-fund; fi
    - npx tsc --noEmit
  rules: !reference [.rules-frontend]

# =====================================================================
# SECURITY (always-on guardrails; HIGH/CRITICAL findings BLOCK)
# =====================================================================

# Static-analyze every Dockerfile in the repo. Fails on errors and warnings.
# Style codes (DL3008/DL3013/...) are tuned via .hadolint.yaml.
security:hadolint:
  stage: security
  image:
    name: "$HADOLINT_IMAGE"
    entrypoint: [""]
  variables:
    GIT_DEPTH: "1"
  script:
    - hadolint --version
    - hadolint Dockerfile.api Dockerfile.web
  rules: !reference [.rules-always]

# Repo-wide secrets scan. Uses .gitleaks.toml at repo root for allowlists.
# Scans the FULL git history (GIT_DEPTH=0) on master/tag pipelines so
# a credential committed three months ago and reverted yesterday is still
# caught. MR pipelines scan only the diff for speed.
security:gitleaks:
  stage: security
  image:
    name: "$GITLEAKS_IMAGE"
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"
  script:
    - gitleaks version
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        gitleaks detect --source . --redact --no-banner \
          --log-opts="--all $CI_MERGE_REQUEST_DIFF_BASE_SHA..HEAD"
      else
        gitleaks detect --source . --redact --no-banner
      fi
  rules: !reference [.rules-always]

# Filesystem CVE scan: dependencies, lockfiles, OS packages in the working
# tree (NOT the built images — that's the `scan` stage). Blocks on
# HIGH/CRITICAL.
security:trivy-fs:
  stage: security
  image:
    name: "$TRIVY_IMAGE"
    entrypoint: [""]
  variables:
    GIT_DEPTH: "1"
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
  cache:
    key: trivy-db
    paths: [".trivycache/"]
  script:
    - trivy --version
    - trivy fs
        --exit-code 1
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --skip-dirs node_modules
        --skip-dirs frontend/node_modules
        --skip-dirs collector/src/ResponseRayCollector/bin
        --skip-dirs collector/src/ResponseRayCollector/obj
        .
  rules: !reference [.rules-always]

# Go vulnerability check (analyzes both deps AND source — only flags CVEs
# whose vulnerable code path is actually reachable from your binaries).
security:govulncheck:
  stage: security
  image: "$GO_IMAGE"
  variables:
    GIT_DEPTH: "1"
    GOFLAGS: "-mod=mod"
  before_script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - export PATH="$(go env GOPATH)/bin:$PATH"
  script:
    - |
      set -e
      FAIL=0
      for mod in backend collector-linux collector-macos; do
        echo "=== govulncheck: $mod ==="
        (cd "$mod" && govulncheck ./...) || FAIL=1
      done
      exit $FAIL
  rules: !reference [.rules-always]

# ct-to-timesketch is on Go 1.26 + CGO; run separately.
security:govulncheck:ctt:
  stage: security
  image: "$GO_IMAGE_CTT"
  variables:
    GIT_DEPTH: "1"
  before_script:
    - apt-get update -q && apt-get install -y -q gcc libc6-dev
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - export PATH="$(go env GOPATH)/bin:$PATH"
  script:
    - cd ct-to-timesketch && CGO_ENABLED=1 govulncheck ./...
  rules: !reference [.rules-always]

# Frontend dep vulnerability scan. --audit-level=high exits non-zero on
# HIGH/CRITICAL only (skips LOW/MODERATE noise).
security:npm-audit:
  stage: security
  image: "$NODE_IMAGE"
  variables:
    GIT_DEPTH: "1"
  script:
    - cd frontend
    - if [ -f package-lock.json ]; then npm ci --no-audit --no-fund; else npm install --no-audit --no-fund; fi
    - npm audit --audit-level=high --omit=dev
  rules: !reference [.rules-always]

# =====================================================================
# TEST
# =====================================================================

test:backend:
  stage: test
  image: "$GO_IMAGE"
  script:
    - cd backend && go test ./...
  rules: !reference [.rules-backend]

test:ct-to-timesketch:
  stage: test
  image: "$GO_IMAGE_CTT"
  before_script:
    - apt-get update -q && apt-get install -y -q gcc libc6-dev
  script:
    - cd ct-to-timesketch && CGO_ENABLED=1 go test ./...
  rules: !reference [.rules-ctt]

test:collector-linux:
  stage: test
  image: "$GO_IMAGE"
  script:
    - cd collector-linux && go test ./...
  rules: !reference [.rules-collector-linux]

test:collector-macos:
  stage: test
  image: "$GO_IMAGE"
  script:
    - cd collector-macos && go test ./...
  rules: !reference [.rules-collector-macos]

test:frontend:
  stage: test
  image: "$NODE_IMAGE"
  script:
    - cd frontend
    - if [ -f package-lock.json ]; then npm ci --no-audit --no-fund; else npm install --no-audit --no-fund; fi
    - npm run build
  artifacts:
    paths: ["frontend/dist/"]
    expire_in: "1 week"
    when: on_success
  rules: !reference [.rules-frontend]

# =====================================================================
# BUILD (collector binaries as downloadable artifacts)
# =====================================================================

build:collector-linux:
  stage: build
  image: "$GO_IMAGE"
  script:
    - mkdir -p dist/linux
    - cd collector-linux
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w"
        -o ../dist/linux/responseray-collector-linux ./cmd/responseray-collector-linux
    - cp INSTALL.txt ../dist/linux/INSTALL.txt
  artifacts:
    name: "responseray-collector-linux-$IMAGE_TAG_SHA"
    paths: ["dist/linux/"]
    expire_in: "1 month"
  rules: !reference [.rules-collector-linux]

build:collector-macos:
  stage: build
  image: "$GO_IMAGE"
  script:
    - mkdir -p dist/macos
    - cd collector-macos
    - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w"
        -o ../dist/macos/responseray-collector-macos ./cmd/responseray-collector-macos
    - cp INSTALL.txt ../dist/macos/INSTALL.txt
  artifacts:
    name: "responseray-collector-macos-$IMAGE_TAG_SHA"
    paths: ["dist/macos/"]
    expire_in: "1 month"
  rules: !reference [.rules-collector-macos]

build:collector-windows:
  stage: build
  image: "$DOTNET_IMAGE"
  script:
    - mkdir -p dist/windows
    - cd collector/src/ResponseRayCollector
    - dotnet publish -c Release -r win-x64 --self-contained true
        /p:PublishSingleFile=true /p:PublishTrimmed=false
        -o ../../../dist/windows
  artifacts:
    name: "responseray-collector-windows-$IMAGE_TAG_SHA"
    paths: ["dist/windows/ResponseRayCollector.exe"]
    expire_in: "1 month"
  rules: !reference [.rules-collector-windows]

build:collector-esxi:
  stage: build
  image: "$ALPINE_IMAGE"
  script:
    - mkdir -p dist/esxi
    - cp collector-esxi/responseray-collector-esxi.sh dist/esxi/
    - cp collector-esxi/README.md dist/esxi/ 2>/dev/null || true
    - chmod 0755 dist/esxi/responseray-collector-esxi.sh
  artifacts:
    name: "responseray-collector-esxi-$IMAGE_TAG_SHA"
    paths: ["dist/esxi/"]
    expire_in: "1 month"
  rules: !reference [.rules-collector-esxi]

# =====================================================================
# CONTAINER (build & push to GitLab Container Registry)
# =====================================================================

container:api:
  stage: container
  extends: .docker-job
  script:
    # Pull previous :latest as warm cache (best-effort)
    - docker pull "$REGISTRY/api:latest" 2>/dev/null || true
    - docker build --pull
        --cache-from "$REGISTRY/api:latest"
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t "$REGISTRY/api:$IMAGE_TAG_SHA"
        -f Dockerfile.api .
    - docker push "$REGISTRY/api:$IMAGE_TAG_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker tag "$REGISTRY/api:$IMAGE_TAG_SHA" "$REGISTRY/api:latest"
        docker push "$REGISTRY/api:latest"
      fi
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$REGISTRY/api:$IMAGE_TAG_SHA" "$REGISTRY/api:$CI_COMMIT_TAG"
        docker push "$REGISTRY/api:$CI_COMMIT_TAG"
      fi
  rules:
    - if: '$FORCE_RUN_ALL == "true"'
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - backend/**/*
        - ct-to-timesketch/**/*
        - collector-linux/**/*
        - collector-macos/**/*
        - collector/**/*
        - collector-esxi/**/*
        - Dockerfile.api
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_TAG =~ /^v/'

container:web:
  stage: container
  extends: .docker-job
  script:
    - docker pull "$REGISTRY/web:latest" 2>/dev/null || true
    - docker build --pull
        --cache-from "$REGISTRY/web:latest"
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t "$REGISTRY/web:$IMAGE_TAG_SHA"
        -f Dockerfile.web .
    - docker push "$REGISTRY/web:$IMAGE_TAG_SHA"
    - |
      if [ "$CI_COMMIT_BRANCH" = "master" ]; then
        docker tag "$REGISTRY/web:$IMAGE_TAG_SHA" "$REGISTRY/web:latest"
        docker push "$REGISTRY/web:latest"
      fi
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$REGISTRY/web:$IMAGE_TAG_SHA" "$REGISTRY/web:$CI_COMMIT_TAG"
        docker push "$REGISTRY/web:$CI_COMMIT_TAG"
      fi
  rules:
    - if: '$FORCE_RUN_ALL == "true"'
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - frontend/**/*
        - Dockerfile.web
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_TAG =~ /^v/'

# Re-tag any image whose component did NOT change so the :<sha> tag is
# uniform across the whole stack. Uses crane (no daemon).
promote:retag-unchanged:
  stage: container
  image:
    name: "$CRANE_IMAGE"
    entrypoint: [""]
  needs:
    - job: container:api
      optional: true
    - job: container:web
      optional: true
  variables:
    GIT_DEPTH: "1"
  before_script:
    - crane auth login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - |
      for img in api web; do
        if crane manifest "$REGISTRY/$img:$IMAGE_TAG_SHA" >/dev/null 2>&1; then
          echo "OK: $img:$IMAGE_TAG_SHA already pushed"
        elif crane manifest "$REGISTRY/$img:latest" >/dev/null 2>&1; then
          echo "Promoting $img:latest -> $img:$IMAGE_TAG_SHA"
          crane tag "$REGISTRY/$img:latest" "$IMAGE_TAG_SHA"
        else
          echo "WARN: no $img image yet; nothing to promote"
        fi
      done
  rules: !reference [.rules-master-or-tag]

# =====================================================================
# SCAN (CVE scan the published images; HIGH/CRITICAL blocks)
# =====================================================================

# Trivy scans the as-pushed api+web images at $REGISTRY/<img>:$IMAGE_TAG_SHA
# (after promote:retag-unchanged ran, both tags are guaranteed to exist).
# Authenticates to GLCR via TRIVY_USERNAME/TRIVY_PASSWORD.
scan:trivy-images:
  stage: scan
  image:
    name: "$TRIVY_IMAGE"
    entrypoint: [""]
  needs:
    - job: promote:retag-unchanged
  variables:
    GIT_DEPTH: "1"
    TRIVY_USERNAME: "$CI_REGISTRY_USER"
    TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
  cache:
    key: trivy-db
    paths: [".trivycache/"]
  script:
    - trivy --version
    - |
      set -e
      FAIL=0
      for img in api web; do
        echo "=== trivy image: $REGISTRY/$img:$IMAGE_TAG_SHA ==="
        trivy image \
          --exit-code 1 \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          "$REGISTRY/$img:$IMAGE_TAG_SHA" || FAIL=1
      done
      exit $FAIL
  rules: !reference [.rules-master-or-tag]

# =====================================================================
# RELEASE (tags only)
# =====================================================================

release:bundle-collectors:
  stage: release
  image: "$ALPINE_IMAGE"
  needs:
    - job: build:collector-linux
      optional: true
    - job: build:collector-macos
      optional: true
    - job: build:collector-windows
      optional: true
    - job: build:collector-esxi
      optional: true
  script:
    - apk add --no-cache zip
    - mkdir -p release
    - cd dist && zip -r "../release/responseray-collectors-${CI_COMMIT_TAG}.zip" .
  artifacts:
    name: "responseray-collectors-$CI_COMMIT_TAG"
    paths: ["release/"]
    expire_in: never
  rules: !reference [.rules-tag-only]

release:gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: ["release:bundle-collectors"]
  script:
    - echo "Creating GitLab Release $CI_COMMIT_TAG"
  release:
    name: "ResponseRay $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    description: |
      Auto-generated release for $CI_COMMIT_TAG.

      Container images:
      - $REGISTRY/api:$CI_COMMIT_TAG
      - $REGISTRY/web:$CI_COMMIT_TAG
    assets:
      links:
        - name: "responseray-collectors-${CI_COMMIT_TAG}.zip"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/release/responseray-collectors-${CI_COMMIT_TAG}.zip"
  rules: !reference [.rules-tag-only]

# =====================================================================
# MIRROR (push GitLab -> GitHub on every successful master / tag run)
# =====================================================================

mirror:github:
  stage: mirror
  image: "$ALPINE_IMAGE"
  variables:
    GIT_STRATEGY: none
  before_script:
    - apk add --no-cache git openssh-client
    - test -n "$GITHUB_MIRROR_TOKEN" || { echo "GITHUB_MIRROR_TOKEN not set"; exit 1; }
    - git config --global user.email "ci@gitlab.nclgisa.org"
    - git config --global user.name  "GitLab CI"
  script:
    - git clone --mirror "$CI_REPOSITORY_URL" mirror.git
    - cd mirror.git
    - git push --mirror "https://oauth2:${GITHUB_MIRROR_TOKEN}@github.com/MixinGasAndHaulinAss/ResponseRay.git"
  rules: !reference [.rules-master-or-tag]
