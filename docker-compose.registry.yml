# =====================================================================
# Registry overlay for production-style deploys.
#
# This overlay pulls the API and web-bundler images from the GitLab
# Container Registry instead of building them locally. Used by the
# Tendril-driven update flow on `dev` so the operator's update is just
# a registry pull + `up -d`.
#
# Usage on dev (the responseray-deployment skill automates this):
#
#   cd /opt/responseray
#   IMAGE_TAG=<short-sha-or-tag> docker compose \
#       -f docker-compose.yml -f docker-compose.registry.yml pull
#   IMAGE_TAG=<short-sha-or-tag> docker compose \
#       -f docker-compose.yml -f docker-compose.registry.yml up -d
#
# Persist a pin in /opt/responseray/.env:
#   IMAGE_TAG=2026.5.1.1     # CalVer release tag
# Or:
#   IMAGE_TAG=af54c75        # commit short-sha
# Or:
#   IMAGE_TAG=latest         # always rolling-latest on master
#
# The CI pipeline (.gitlab-ci.yml) guarantees that every commit on master
# publishes BOTH :<short-sha> and :latest tags, so any of those works.
# `promote:retag-unchanged` ensures unchanged components are re-tagged
# to the current short-sha so the whole stack pins to one commit.
#
# `pull_policy: always` ensures `up -d` re-pulls the image instead of
# falling back to the local `build:` directive in docker-compose.yml.
#
# For local development, omit this overlay; docker-compose.yml's
# `build:` directives still work as before.
# =====================================================================

services:
  api:
    image: "glcr.nclgisa.org:443/striketeam/responseray/api:${IMAGE_TAG:-latest}"
    pull_policy: always

  frontend-build:
    image: "glcr.nclgisa.org:443/striketeam/responseray/web:${IMAGE_TAG:-latest}"
    pull_policy: always
