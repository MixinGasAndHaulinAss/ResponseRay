# Gitleaks config for ResponseRay.
#
# Inherits gitleaks' built-in default ruleset, then narrowly allowlists
# repo-specific false positives. Every entry needs a justification —
# do NOT add new allowlist rules without operator review.

title = "ResponseRay gitleaks config"

[extend]
useDefault = true

# Repo-wide allowlist for known-safe matches.
[allowlist]
description = "Global allowlist for known false positives"
paths = [
  # Vendored Go module checksums and lockfiles regularly contain
  # high-entropy hashes that look like secrets to gitleaks.
  '''(^|/)go\.sum$''',
  '''(^|/)package-lock\.json$''',

  # Frontend build outputs are reproducible static assets.
  '''^frontend/dist/''',

  # Test fixtures: synthetic, never sensitive.
  '''/testdata/''',
]

regexes = [
  # `.env.example` ships placeholder credentials like
  # POSTGRES_PASSWORD=changeme_in_production — these are documentation,
  # not real secrets.
  '''changeme_in_production''',
  '''dfir-replace-me''',
  # Container registry hostname (no creds, just a URL).
  '''glcr\.nclgisa\.org(:443)?''',
  # README curl examples that show users HOW to call the API. The
  # username/password literals are placeholders ("analyst:your_password",
  # "X-API-Key: rrk_...") shown for documentation, not real credentials.
  '''your_password''',
  '''X-API-Key:\s*rrk_''',
  '''-u\s*"analyst:your_password"''',
]

# Documentation paths frequently contain illustrative credential-looking
# strings. Allowlist them at the path level so we don't have to chase
# every doc snippet individually.
[[rules]]
id = "generic-api-key"
[[rules.allowlists]]
description = "Allow analysis/runbook docs to show example token formats"
paths = [
  '''(^|/)README\.md$''',
  '''(^|/)docs?/''',
  '''/CLOUDRULES_ANALYSIS\.md$''',
]

[[rules]]
id = "curl-auth-header"
[[rules.allowlists]]
description = "README + ApiKeys UI page show curl usage examples"
paths = [
  '''(^|/)README\.md$''',
  '''(^|/)frontend/src/pages/ApiKeys\.tsx$''',
  '''(^|/)docs?/''',
]

[[rules]]
id = "curl-auth-user"
[[rules.allowlists]]
description = "README curl -u example uses placeholder credentials"
paths = [
  '''(^|/)README\.md$''',
  '''(^|/)docs?/''',
]

# Add per-rule allowlists below as findings warrant. Pattern:
#   [[rules.allowlist]]
#   description = "why this is OK"
#   paths = ['''path/regex''']
#   regexes = ['''content/regex''']
